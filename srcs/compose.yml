volumes:
  wordpress:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/iubieta-/data/wordpress
  mariadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/iubieta-/data/mariadb

services:
  nginx:
    image: iubieta/nginx:latest
    build: nginx/
    ports:
      - 443:443
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - wordpress:/var/www/html

  mariadb:
    image: iubieta/mariadb:latest
    build: mariadb/
    ports:
      - 3306:3306
    volumes:
      - mariadb:/var/lib/mysql
    env_file:
      - .env

  wordpress:
    image: iubieta/wordpress:latest
    build: wordpress/
    ports:
      - 9000:9000
    volumes:
      - ./wordpress/data:/var/www/html
    env_file:
      - .env
