server {
    listen 443 ssl;
    server_name iubieta-.42.fr;

    ssl_certificate     /etc/nginx/ssl/iubieta.crt;
    ssl_certificate_key /etc/nginx/ssl/iubieta.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    
	# Raíz donde están los archivos de WordPress
    root /var/www/html;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}

